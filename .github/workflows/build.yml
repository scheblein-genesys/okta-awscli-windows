name: Build and Release okta-awscli Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest  # ← AMD64 Windows

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip3 install okta-awscli pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name okta-awscli C:\hostedtoolcache\windows\Python\3.14.3\x64\Lib\site-packages\oktaawscli\okta_awscli.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: okta-awscli-windows
          path: dist/okta-awscli.exe

      - name: Create or update GitHub Release and upload asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              "dist/okta-awscli.exe#okta-awscli-windows.exe" `
              --title $tag `
              --notes "Windows AMD64 build for okta-awscli"
          } else {
            gh release upload $tag `
              "dist/okta-awscli.exe#okta-awscli-windows.exe" `
              --clobber
          }