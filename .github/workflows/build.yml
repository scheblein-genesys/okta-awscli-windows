name: Build and Release okta-awscli Windows EXE

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        default: v0.5.5

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip3 install okta-awscli pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name okta-awscli C:\hostedtoolcache\windows\Python\3.14.3\x64\Lib\site-packages\oktaawscli\okta_awscli.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: okta-awscli-windows
          path: dist/okta-awscli.exe

      - name: Create or update GitHub Release and upload asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = $env:RELEASE_TAG
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              "dist/okta-awscli.exe#okta-awscli-windows-amd64.exe" `
              --title $tag `
              --notes "Windows AMD64 build for okta-awscli"
          } else {
            gh release upload $tag `
              "dist/okta-awscli.exe#okta-awscli-windows-amd64.exe" `
              --clobber
          }