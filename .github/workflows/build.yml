name: Build okta-awscli Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # ← AMD64 Windows

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip3 install okta-awscli pyinstaller

      - name: Show install location
        run: |
          python -c "import oktaawscli; print(oktaawscli.__file__)"

